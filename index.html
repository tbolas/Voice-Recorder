<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voice Recording</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #333; }
  h2 { margin-bottom: 4px; }
  .prompt-box { background: #f5f5f5; border-left: 4px solid #4a90d9; padding: 16px 20px;
                border-radius: 4px; font-size: 18px; line-height: 1.6; margin: 20px 0; }
  label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
  input[type=text] { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc;
                     border-radius: 4px; box-sizing: border-box; margin-bottom: 20px; }
  .btn { padding: 12px 24px; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; margin-right: 10px; }
  #recordBtn { background: #e53935; color: white; }
  #recordBtn.recording { background: #555; }
  #submitBtn { background: #1e88e5; color: white; display: none; }
  #submitBtn:disabled { background: #aaa; cursor: default; }
  .timer { font-size: 13px; color: #e53935; margin-top: 8px; min-height: 20px; }
  #status { margin-top: 16px; font-size: 14px; color: #555; }
  audio { display: block; margin: 16px 0; width: 100%; }
</style>
</head>
<body>

<h2>Voice Recording</h2>
<p style="color:#555;font-size:14px;">Enter your name, read the passage aloud, then submit.</p>

<label for="nameField">Your name</label>
<input type="text" id="nameField" placeholder="Full name" />

<label>Read this passage aloud:</label>
<div class="prompt-box" id="promptDisplay"></div>

<button class="btn" id="recordBtn" onclick="toggleRecord()">Start recording</button>
<div class="timer" id="timerDisplay"></div>
<audio id="audioPlayback" controls style="display:none"></audio>
<br>
<button class="btn" id="submitBtn" onclick="submitForm()">Submit recording</button>
<div id="status"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
<script>
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5qt-VGlU3iG3KvR8UZLmRLKYubN94FgtN1j6Rmw5yMWTaflXOKAbF4tKqnvTVRBld1A/exec';

  var PROMPTS = [
    "Ubu rero, ubugingo bwanjye butera inkunga. Nzabona icyo nshaka, kandi sinzigera nshidikanya ku magambo y'ukuri.",
    "The quick brown fox jumps over the lazy dog. She sells seashells by the seashore."
  ];

  var promptText = PROMPTS[Math.floor(Math.random() * PROMPTS.length)];
  document.getElementById('promptDisplay').textContent = promptText;

  var audioContext, mediaStream, scriptProcessor, mp3Encoder;
  var mp3Chunks = [];
  var isRecording = false;
  var timerInterval, seconds = 0;

  function toggleRecord() {
    if (!isRecording) { startRecording(); } else { stopRecording(); }
  }

  function startRecording() {
    mp3Chunks = [];
    document.getElementById('audioPlayback').style.display = 'none';
    document.getElementById('submitBtn').style.display = 'none';
    document.getElementById('status').textContent = '';

    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(function(stream) {
        mediaStream = stream;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        var sampleRate = audioContext.sampleRate;
        mp3Encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);

        var source = audioContext.createMediaStreamSource(stream);
        scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

        scriptProcessor.onaudioprocess = function(e) {
          if (!isRecording) return;
          var samples = e.inputBuffer.getChannelData(0);
          var int16 = new Int16Array(samples.length);
          for (var i = 0; i < samples.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, samples[i] * 32768));
          }
          var encoded = mp3Encoder.encodeBuffer(int16);
          if (encoded.length > 0) mp3Chunks.push(encoded);
        };

        source.connect(scriptProcessor);
        scriptProcessor.connect(audioContext.destination);

        isRecording = true;
        document.getElementById('recordBtn').textContent = 'Stop recording';
        document.getElementById('recordBtn').classList.add('recording');
        startTimer();
      })
      .catch(function(err) {
        var msg = 'Microphone error: ' + err.name;
        if (err.name === 'NotAllowedError') msg = 'Microphone permission denied. Please allow access and try again.';
        if (err.name === 'NotFoundError') msg = 'No microphone found on this device.';
        document.getElementById('status').textContent = msg;
      });
  }

  function stopRecording() {
    isRecording = false;
    clearInterval(timerInterval);
    document.getElementById('timerDisplay').textContent = '';
    document.getElementById('recordBtn').textContent = 'Re-record';
    document.getElementById('recordBtn').classList.remove('recording');

    if (scriptProcessor) scriptProcessor.disconnect();
    if (mediaStream) mediaStream.getTracks().forEach(function(t) { t.stop(); });
    if (audioContext) audioContext.close();

    var final = mp3Encoder.flush();
    if (final.length > 0) mp3Chunks.push(final);

    var blob = new Blob(mp3Chunks, { type: 'audio/mp3' });
    var url = URL.createObjectURL(blob);
    document.getElementById('audioPlayback').src = url;
    document.getElementById('audioPlayback').style.display = 'block';
    document.getElementById('submitBtn').style.display = 'inline-block';
  }

  function startTimer() {
    seconds = 0;
    timerInterval = setInterval(function() {
      seconds++;
      var m = Math.floor(seconds / 60), s = seconds % 60;
      document.getElementById('timerDisplay').textContent =
        'Recording: ' + m + ':' + (s < 10 ? '0' : '') + s;
    }, 1000);
  }

  function submitForm() {
    var name = document.getElementById('nameField').value.trim();
    if (!name) { alert('Please enter your name.'); return; }
    if (!mp3Chunks.length) { alert('Please record audio first.'); return; }

    document.getElementById('status').textContent = 'Uploading...';
    document.getElementById('submitBtn').disabled = true;

    var blob = new Blob(mp3Chunks, { type: 'audio/mp3' });
    var reader = new FileReader();
    reader.onloadend = function() {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          name: name,
          promptText: promptText,
          dataURI: reader.result
        })
      })
      .then(function() {
        document.getElementById('status').textContent = 'Submitted! Thank you.';
        document.getElementById('submitBtn').disabled = false;
      })
      .catch(function(err) {
        document.getElementById('status').textContent = 'Upload failed: ' + err.message;
        document.getElementById('submitBtn').disabled = false;
      });
    };
    reader.readAsDataURL(blob);
  }
</script>
</body>
</html>
